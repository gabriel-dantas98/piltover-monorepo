name: reusable-docs-deploy

on:
  workflow_call:
    inputs:
      base_path:
        description: Pages base path used as PAGES_BASE_PATH at build time.
        required: false
        type: string
        default: /piltover-monorepo

# This workflow assumes GitHub Pages is enabled on the repo with
# "GitHub Actions" as the source. The `environment: github-pages`
# block requires Pages to be enabled — otherwise GitHub rejects this
# workflow at startup. For a build-only validation that does NOT
# require Pages enabled, use reusable-docs-build.yml instead.

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        working-directory: apps/docs
        run: bun install --frozen-lockfile
      - name: Build
        working-directory: apps/docs
        env:
          PAGES_BASE_PATH: ${{ inputs.base_path }}
        run: |
          echo "→ [apps/docs] $ bun run build"
          bun run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/out

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
