name: Setup OpenTofu with AWS OIDC
description: Assume the GitHub Actions IAM role via OIDC, then install OpenTofu and expose it on PATH.

inputs:
  role_arn:
    description: ARN of the IAM role to assume. Output of the github-oidc-provider stack.
    required: true
  aws_region:
    description: AWS region to configure for downstream tofu commands.
    required: false
    default: us-east-1
  tofu_version:
    description: OpenTofu version to install.
    required: false
    default: "1.8.0"

runs:
  using: composite
  steps:
    - name: Configure AWS credentials via OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.role_arn }}
        aws-region: ${{ inputs.aws_region }}

    - name: Set up OpenTofu
      uses: opentofu/setup-opentofu@v1
      with:
        tofu_version: ${{ inputs.tofu_version }}

    - name: Smoke
      shell: bash
      run: |
        echo "→ [.] $ tofu --version"
        tofu --version
