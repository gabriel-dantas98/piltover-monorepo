version: "2"
run:
  timeout: 3m
linters:
  enable:
    - govet
    - ineffassign
    - staticcheck
    - unused
    - errcheck
    - gosec
    - revive
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintln
        - fmt.Fprintf
        - fmt.Fprint
        - (*text/tabwriter.Writer).Flush
formatters:
  enable:
    - gofmt
